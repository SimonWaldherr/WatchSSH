# =============================================================================
# WatchSSH — Example Configuration
# =============================================================================
#
# Copy to config.yaml and adjust to your environment.
# All keys are optional unless noted as required.
#
# Security note: host key verification is ENABLED by default (strict mode).
# Before adding a new server, verify its SSH host key fingerprint out-of-band
# (e.g. by logging in interactively and comparing fingerprints).
# =============================================================================


# -----------------------------------------------------------------------------
# Global SSH security settings
# -----------------------------------------------------------------------------

# Path to the SSH known_hosts file used for host key verification.
# Defaults to ~/.ssh/known_hosts when not set.
# known_hosts_path: ~/.ssh/known_hosts

# strict_host_key_checking: true (default) — refuse connections to hosts not
#   in known_hosts or whose key has changed (recommended for production).
# strict_host_key_checking: false — accept any host key (DANGEROUS; for
#   testing only). Prefer per-server insecure_ignore_host_key instead.
strict_host_key_checking: true

# Optional shared HashiCorp Vault configuration for auth.*_source.vault_kv.
# The Vault token is intentionally read from an environment variable or a
# root-owned file, never stored in config.yaml. KV v1 and v2 are supported.
# secrets:
#   vault:
#     address: https://vault.example.internal
#     token_env: VAULT_TOKEN
#     # token_file: /run/secrets/watchssh-vault-token
#     namespace: operations
#     kv_version: 2


# -----------------------------------------------------------------------------
# Global polling settings
# -----------------------------------------------------------------------------

# How often to collect metrics from all servers (seconds). Default: 60.
interval: 60

# SSH connection and per-command timeout (seconds). Default: 30.
timeout: 30

# Maximum number of servers polled concurrently. Default: 0 (one goroutine
# per server). Set to a positive integer to cap concurrency, which is useful
# when monitoring many hosts to avoid overwhelming the monitoring machine or
# exhausting SSH connection limits.
# workers: 10


# -----------------------------------------------------------------------------
# Output settings
# -----------------------------------------------------------------------------

output:
  # "console" (default) — human-readable ASCII table on stdout
  # "json"               — machine-readable JSON (optionally to a file)
  type: console

  # When type is "json", optionally write to a file instead of stdout.
  # file: /var/log/watchssh/metrics.json


# -----------------------------------------------------------------------------
# Optional history storage
# -----------------------------------------------------------------------------

storage:
  # "none" (default) — keep only live in-memory state
  # "tinysql"        — persist metric samples and alert firings locally
  type: none

  # Used when type is "tinysql". WatchSSH stores compact query columns plus
  # the full metric/alert JSON payload in an embedded tinySQL database file.
  # path: ./watchssh.tinysql

  # Remove history records older than this many days. 0 disables age-based retention.
  retention_days: 30

  # Trim oldest history records when the database file grows beyond this size.
  # 0 disables size-based retention.
  max_size_mb: 512


# -----------------------------------------------------------------------------
# Web dashboard
# -----------------------------------------------------------------------------

web:
  enabled: false
  # Bind to loopback when a reverse proxy terminates TLS in front of WatchSSH.
  # listen: "127.0.0.1:8080"
  listen: ":8080"    # TCP address and port to listen on

  # Optional protection for the dashboard, JSON APIs, and /metrics.
  # Keep healthz and readyz public for service managers and load balancers.
  # Generate a bcrypt value interactively with: htpasswd -nBC 12 ops
  # auth:
  #   username: ops
  #   password_hash: "$2y$12$replace-with-the-hash-after-ops:"


# -----------------------------------------------------------------------------
# Servers
# -----------------------------------------------------------------------------

servers:
  # ── Linux server via SSH key ─────────────────────────────────────────────
  - name: web-01
    host: 192.0.2.10
    port: 22             # Default: 22
    username: monitor    # Use a dedicated monitoring user with minimal privileges

    auth:
      type: key          # "key" (default), "agent", "password", or "keyboard-interactive"
      key_file: ~/.ssh/id_ed25519
      # passphrase: "secret"   # Uncomment if the key is passphrase-protected

      # Credential alternatives: use exactly one source for each material.
      # private_key:
      #   file: /run/secrets/web-01-id_ed25519
      #   # env: WATCHSSH_WEB01_PRIVATE_KEY
      #   # vault_kv: {mount: infrastructure, path: watchssh/web-01, field: private_key}
      # passphrase_source:
      #   env: WATCHSSH_WEB01_KEY_PASSPHRASE
      # certificate_file: /etc/watchssh/web-01-cert.pub

    # insecure_ignore_host_key: false   # Default: false. NEVER enable in production.

    # Optional tags for grouping and CLI filtering via `-tags`.
    tags:
      - linux
      - web

    # Optional Docker container metrics (Linux only).
    # When enabled, WatchSSH runs `docker ps` and `docker stats --no-stream`
    # to collect per-container CPU, memory, network, and block I/O.
    # Requires the monitoring user to be in the `docker` group (or equivalent).
    docker:
      enabled: false

    checks:
      ping:
        enabled: true
        count: 3          # ICMP packets to send
        timeout: 5        # seconds to wait

      ports:
        - port: 80
          timeout: 5
        - port: 443
          timeout: 5

      http:
        - url: https://web-01.example.com/health
          method: GET
          expected_status: 200
          expected_body: '"status":"ready"' # optional response substring
          timeout: 10

      dns:
        - name: public-dns
          host: web-01.example.com
          type: A
          server: 1.1.1.1
          expected_answer: 192.0.2.
          timeout: 5

      traceroute:
        - name: path-to-edge
          host: 192.0.2.10
          max_hops: 30
          timeout: 10

      tls:
        - name: public-cert
          host: web-01.example.com
          port: 443
          server_name: web-01.example.com
          timeout: 5

      # SNTP time probe. The optional maximum offset turns clock drift into a failure.
      ntp:
        - name: cloudflare-time
          host: time.cloudflare.com
          port: 123
          max_offset_ms: 100
          timeout: 5

      # Custom SSH command checks (run on the remote host via SSH).
      custom:
        - name: nginx-running
          command: "pgrep -x nginx >/dev/null && echo OK || echo FAILED"
          expected_output: "OK"

  # ── macOS / Darwin server ────────────────────────────────────────────────
  - name: macos-builder
    host: 192.0.2.20
    port: 22
    username: monitor

    auth:
      type: agent    # Delegate to the SSH agent (SSH_AUTH_SOCK must be set)

    tags:
      - darwin
      - ci

  # ── FreeBSD server ───────────────────────────────────────────────────────
  - name: freebsd-db
    host: 192.0.2.30
    port: 22
    username: monitor

    auth:
      type: key
      key_file: ~/.ssh/id_ed25519

    tags:
      - freebsd
      - database

  # ── OpenBSD server (partial metrics) ────────────────────────────────────
  - name: openbsd-fw
    host: 192.0.2.40
    port: 22
    username: monitor

    auth:
      type: key
      key_file: ~/.ssh/id_ed25519

    tags:
      - openbsd
      - firewall

  # ── NetBSD server (partial metrics) ─────────────────────────────────────
  - name: netbsd-router
    host: 192.0.2.50
    port: 22
    username: monitor

    auth:
      type: key
      key_file: ~/.ssh/id_ed25519

    tags:
      - netbsd

  # ── Local machine (no SSH required) ──────────────────────────────────────
  - name: localhost
    local: true    # Run commands locally; no SSH connection is made
    docker:
      enabled: true   # Collect local Docker container stats when available (Linux only)

  # ── HARP reverse proxy profile ──────────────────────────────────────────
  # HARP exposes the same kind of operational surface WatchSSH already probes:
  # liveness/readiness HTTP endpoints, public DNS, TLS certificate freshness,
  # and an optional Prometheus-compatible /metrics endpoint.
  - name: harp-proxy
    host: harp.example.com
    port: 22
    username: monitor
    auth:
      type: key
      key_file: ~/.ssh/id_ed25519
    tags:
      - harp
      - reverse-proxy
    checks:
      http:
        - url: https://harp.example.com/health
          expected_status: 200
          timeout: 5
        - url: https://harp.example.com/readyz
          expected_status: 200
          timeout: 5
        - url: https://harp.example.com/metrics
          expected_status: 200
          timeout: 5
      dns:
        - name: harp-public-dns
          host: harp.example.com
          type: A
          server: 1.1.1.1
          timeout: 5
      tls:
        - name: harp-public-cert
          host: harp.example.com
          port: 443
          server_name: harp.example.com
          timeout: 5


# -----------------------------------------------------------------------------
# Alerts
# -----------------------------------------------------------------------------

alerts:
  # Minimum seconds between repeated alerts for the same rule+server. Default: 3600.
  cooldown: 3600

  rules:
    # CPU threshold alert (fires when usage > 90% for any server)
    - name: HighCPU
      metric: cpu_usage
      operator: ">"
      threshold: 90

    # RAM threshold (all servers)
    - name: HighMemory
      metric: mem_usage
      operator: ">"
      threshold: 85

    # Disk space (root partition only, all servers)
    - name: DiskAlmostFull
      metric: disk_usage
      operator: ">"
      threshold: 85
      mount_point: /

    # Inode usage (root partition only, all servers)
    - name: InodesAlmostFull
      metric: disk_inode_usage
      operator: ">"
      threshold: 85
      mount_point: /

    # Linux/macOS file descriptor pressure
    - name: FileDescriptorsHigh
      metric: file_descriptor_usage
      operator: ">"
      threshold: 80

    # Network error counters are cumulative since boot
    - name: NetworkErrorsSeen
      metric: network_errors
      operator: ">"
      threshold: 100

    # 1-minute load average (web servers only)
    - name: HighLoad
      metric: load1
      operator: ">"
      threshold: 4.0
      servers:
        - web-01

    # Swap usage alert
    - name: SwapHigh
      metric: swap_usage
      operator: ">"
      threshold: 80

    # Ping failure alert
    - name: PingFailed
      metric: ping_failed
      operator: "=="
      threshold: 1
      servers:
        - web-01

    # Port check alert
    - name: HttpPortDown
      metric: port_closed
      operator: "=="
      threshold: 1
      port: 80
      servers:
        - web-01

    # HTTP check failure alert
    - name: HealthCheckFailed
      metric: http_failed
      operator: "=="
      threshold: 1

    # TLS certificate expiring soon (days remaining)
    - name: CertExpiringSoon
      metric: cert_expires_days
      operator: "<"
      threshold: 30

    # DNS probe failure or slow resolver response
    - name: DNSProbeFailed
      metric: dns_failed
      operator: "=="
      threshold: 1

    - name: DNSProbeSlow
      metric: dns_latency
      operator: ">"
      threshold: 250

    # Traceroute path changed or became too long
    - name: TracerouteTooLong
      metric: traceroute_hops
      operator: ">"
      threshold: 20

    # Dedicated TLS probe failure / certificate expiry
    - name: TLSProbeFailed
      metric: tls_failed
      operator: "=="
      threshold: 1

    - name: TLSProbeCertExpiringSoon
      metric: tls_cert_expires_days
      operator: "<"
      threshold: 30

    # Raspberry Pi / SBC board health
    - name: BoardTooHot
      metric: board_temperature
      operator: ">"
      threshold: 80

    - name: BoardUnderVoltage
      metric: board_under_voltage
      operator: "=="
      threshold: 1

    - name: BoardThrottled
      metric: board_throttled
      operator: "=="
      threshold: 1

    - name: BoardWiFiWeak
      metric: board_wifi_rssi
      operator: "<"
      threshold: -75

    # HARP reverse proxy checks
    - name: HARPHealthDown
      metric: http_failed
      operator: "=="
      threshold: 1
      servers:
        - harp-proxy

    - name: HARPCertExpiringSoon
      metric: tls_cert_expires_days
      operator: "<"
      threshold: 30
      servers:
        - harp-proxy

    # Custom check failure
    - name: NginxDown
      metric: custom_failed
      operator: "=="
      threshold: 1
      servers:
        - web-01

  # Universal outbound alert routes (optional). Routes are evaluated in order.
  # The first matching route handles an alert unless continue: true is set.
  # Headers can come from environment variables to keep tokens out of YAML.
  # routes:
  #   - name: slack-production
  #     metrics: [cpu_usage, mem_usage, disk_usage, http_failed]
  #     continue: true
  #     webhook:
  #       url_env: WATCHSSH_SLACK_WEBHOOK_URL
  #       header_env:
  #         Authorization: WATCHSSH_SLACK_AUTHORIZATION
  #       body_template: |
  #         {"text": {{json .Summary}}}
  #
  #   - name: incident-platform
  #     servers: [web-01, harp-proxy]
  #     webhook:
  #       url: https://events.example.internal/watchssh
  #       method: POST
  #       headers:
  #         X-Integration: watchssh
  #       # Without body_template WatchSSH sends its standard JSON envelope.
  #       # Template fields: .Route, .Alerts, .Summary, .FiredAt

  # SMTP email notifications (optional)
  # email:
  #   smtp_host: smtp.example.com
  #   smtp_port: 587
  #   tls_mode: starttls   # "none", "starttls" (default), or "tls"
  #   username: alerter@example.com
  #   password: "secret"
  #   from: watchssh@example.com
  #   to:
  #     - ops@example.com
  #     - oncall@example.com

  # Guarded local remediation hook (optional)
  # Runs only when alerts fire and only if the executable is allowlisted.
  # The command receives a JSON array of firings on stdin.
  # action:
  #   command: "logger -t watchssh-alert remediation triggered"
  #   allowed_executables:
  #     - logger
  #   timeout: 10
